title: HydroQuantum
description: is a platform advancing quantum computing applications in hydrology and water resources. It develops quantum algorithms and quantum-enhanced machine learning for improved modeling, prediction, optimization, and uncertainty quantification in complex water systems. All code, publications, and training materials are freely available, and we welcome collaboration — contact samadi@gmail.com for more information.
  
email: samadi@clemson.edu
url: "https://HydroQuantum.github.io"
baseurl: ""
lang: en
markdown: kramdown
permalink: pretty
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

collections:
  publications:
    output: true
    permalink: /publications/:name/
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
  - scope:
      path: ""
      type: projects
    values:
      layout: project


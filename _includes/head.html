<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- Prepare early connection to Google Fonts. -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- Prepare early connection to Font Static Assests. -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"> <!-- Load font family. -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

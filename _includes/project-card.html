<!-- <a class="card listing-card" href="{{ include.item.url | relative_url }}"> -->
<a class="card listing-card" href="{{ '/projects/' | append: include.item.slug | append: '/' | relative_url }}">
  {% if include.item.image %}
    <img
      class="listing-image"
      src="{{ include.item.image | relative_url }}"
      alt="{{ include.item.name }}"
    >
  {% endif %}

  <span class="badge">{{ include.item.status | default: "Project" }}</span>

  <h3>{{ include.item.name }}</h3>

  {% if include.item.summary %}
    <p>{{ include.item.summary }}</p>
  {% endif %}
</a>
